name: Daily Biotech Digest

on:
  schedule:
    - cron: "0 6 * * *"
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      force_send:
        description: "Post to Slack even if not 08:00 Stockholm time"
        required: false
        default: "false"

jobs:
  run-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packages
        run: |
          pip install -r requirements.txt

      - name: Run digest
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          FORCE_SEND: ${{ github.event.inputs.force_send }}
          DEBUG_NEWS: "1"
          GOOGLE_UNWRAP_CAP: "30"
          PER_FEED_LIMIT: "40"
          NEWS_TIMEOUT_S: "25"
        run: |
          python digest.py
